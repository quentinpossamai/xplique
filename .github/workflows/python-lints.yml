name: ruff

on:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: |
          uv pip install --system tox tox-uv
      - name: Check lint
        run: tox -e py313-lint
